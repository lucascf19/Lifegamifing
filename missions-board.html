<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de Missões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'slate-dark': '#1e293b',
                        'slate-darker': '#0f172a',
                        'purple-soft': '#7c3aed',
                        'purple-lighter': '#a78bfa',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }
        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
        .floating-btn {
            transition: all 0.3s ease;
        }
        .floating-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }
    </style>
</head>
<body class="bg-slate-darker min-h-screen text-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header com Contadores -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold mb-6 text-purple-lighter">📋 Quadro de Missões</h1>
            
            <div class="flex flex-wrap gap-4 mb-6">
                <!-- Contador de Energia Total -->
                <div class="bg-slate-dark border border-purple-soft/30 rounded-lg px-6 py-4 flex items-center gap-3 shadow-lg">
                    <div class="text-3xl">⚡</div>
                    <div>
                        <div class="text-sm text-gray-400">Energia Total</div>
                        <div class="text-2xl font-bold text-purple-lighter" id="energyTotal">0</div>
                    </div>
                </div>
                
                <!-- Contador de Cristais de Foco -->
                <div class="bg-slate-dark border border-purple-soft/30 rounded-lg px-6 py-4 flex items-center gap-3 shadow-lg">
                    <div class="text-3xl">💎</div>
                    <div>
                        <div class="text-sm text-gray-400">Cristais de Foco</div>
                        <div class="text-2xl font-bold text-purple-lighter" id="focusCrystals">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid de Missões -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="missionsGrid">
            <!-- Missões serão inseridas aqui via JavaScript -->
        </div>

        <!-- Mensagem quando não há missões -->
        <div id="emptyState" class="hidden text-center py-12">
            <div class="text-6xl mb-4">🎯</div>
            <p class="text-gray-400 text-lg">Nenhuma missão disponível</p>
            <p class="text-gray-500 text-sm mt-2">Clique no botão + para adicionar uma nova missão</p>
        </div>

        <!-- Botão Flutuante para Adicionar Missão -->
        <button 
            id="addMissionBtn"
            class="fixed bottom-8 right-8 w-16 h-16 bg-purple-soft hover:bg-purple-lighter text-white rounded-full shadow-2xl flex items-center justify-center text-3xl floating-btn z-50 transition-all duration-300"
            onclick="openAddMissionModal()"
        >
            +
        </button>

        <!-- Modal para Adicionar Missão -->
        <div id="addMissionModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-slate-dark border border-purple-soft/30 rounded-xl p-6 w-full max-w-md shadow-2xl">
                <h2 class="text-2xl font-bold mb-4 text-purple-lighter">Nova Missão</h2>
                
                <form id="missionForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Nome da Tarefa</label>
                        <input 
                            type="text" 
                            id="missionName"
                            class="w-full bg-slate-darker border border-purple-soft/30 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-purple-soft focus:ring-2 focus:ring-purple-soft/50"
                            placeholder="Ex: Estudar JavaScript"
                            required
                        >
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Categoria</label>
                        <select 
                            id="missionCategory"
                            class="w-full bg-slate-darker border border-purple-soft/30 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-purple-soft focus:ring-2 focus:ring-purple-soft/50"
                            required
                        >
                            <option value="Estudo">📚 Estudo</option>
                            <option value="Trabalho">💼 Trabalho</option>
                            <option value="Saúde">💪 Saúde</option>
                            <option value="Criatividade">🎨 Criatividade</option>
                            <option value="Social">👥 Social</option>
                            <option value="Outros">🔖 Outros</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Recompensa (Cristais)</label>
                        <input 
                            type="number" 
                            id="missionReward"
                            class="w-full bg-slate-darker border border-purple-soft/30 rounded-lg px-4 py-2 text-gray-100 focus:outline-none focus:border-purple-soft focus:ring-2 focus:ring-purple-soft/50"
                            placeholder="Ex: 10"
                            min="1"
                            value="10"
                            required
                        >
                    </div>
                    
                    <div class="flex gap-3 pt-4">
                        <button 
                            type="submit"
                            class="flex-1 bg-purple-soft hover:bg-purple-lighter text-white font-semibold py-2 px-4 rounded-lg transition-colors"
                        >
                            Adicionar
                        </button>
                        <button 
                            type="button"
                            onclick="closeAddMissionModal()"
                            class="flex-1 bg-slate-darker hover:bg-slate-700 border border-purple-soft/30 text-gray-300 font-semibold py-2 px-4 rounded-lg transition-colors"
                        >
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="missions-board.js"></script>
</body>
</html>
