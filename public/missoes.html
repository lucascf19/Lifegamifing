<!DOCTYPE html>
<html lang="pt-BR" style="font-size: 18px;">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <title>App Gamificação - Missões</title>

  <!-- Chart.js (algumas partes de script.js podem depender) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Google Fonts - Medieval -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Press+Start+2P&display=swap"
    rel="stylesheet"
  >

  <!-- FontAwesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  >

  <!-- CSS global compilado pelo Vite/Tailwind -->
  <link rel="stylesheet" href="./assets/index.css">

  <!-- Navegação dinâmica -->
  <script src="/nav.js" defer></script>
  <!-- Lógica core do RPG -->
  <script src="/script.js" defer></script>
</head>
<body class="bg-black">
  <!-- Camada de Aura do Escudo (sobreposta) -->
  <div id="aura-escudo" class="pointer-events-none fixed inset-0 z-[9999] transition-opacity duration-500 opacity-0"></div>

  <div id="root"></div>
  <div id="app">
    <!-- Reaproveita as telas de login / criação se necessário -->
    <!-- Para simplificar, Missões assume usuário logado e personagem criado -->

    <div id="app-container" class="bg-black" style="display: block !important; min-height: 100vh; position: relative;">
      <!-- Header RPG copiado do index.html (resumido aqui) -->
      <div id="header-rpg" class="sticky top-0 z-[100] bg-black/90 backdrop-blur-md border-b border-gray-900/50">
        <!-- Você pode copiar o conteúdo completo do header atual do index.html,
             incluindo avatar, XP, cristais etc., para manter consistência visual -->
      </div>

      <main id="main-content" class="relative w-full">
        <div id="missions-page" class="page px-3 py-2">
          <div class="rpg-card">
            <h2 class="text-base font-bold mb-2 text-medieval">Missões</h2>

            <!-- Abas Rotina / Jornada -->
            <div class="flex gap-2 mb-3 border-b border-gray-800">
              <button
                onclick="window.trocarAbaMissao && window.trocarAbaMissao('rotina');"
                id="aba-rotina"
                class="px-4 py-2 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-400 transition-colors"
              >
                Minha Rotina
              </button>
              <button
                onclick="window.trocarAbaMissao && window.trocarAbaMissao('jornada');"
                id="aba-jornada"
                class="px-4 py-2 text-sm font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-300 transition-colors"
              >
                Jornada
              </button>
            </div>
          </div>

          <!-- Conteúdo: Minha Rotina -->
          <div id="conteudo-rotina" class="space-y-3 mt-0">
            <!-- Widget de Beber Água -->
            <div id="agua-widget-card" class="card-rpg">
              <div class="flex items-center gap-3 mb-3">
                <span class="text-3xl">💧</span>
                <div class="flex-1">
                  <h3 class="font-semibold text-sm mb-1">Beber Água</h3>
                  <div class="flex items-center justify-between">
                    <span id="agua-progresso-texto" class="text-xs text-gray-400">0 / 2000 ml</span>
                    <span id="agua-porcentagem" class="text-xs font-bold text-blue-400">0%</span>
                  </div>
                </div>
              </div>

              <!-- Barra de Progresso -->
              <div class="w-full bg-gray-900 rounded-full h-3 mb-3 overflow-hidden">
                <div
                  id="agua-progresso-barra"
                  class="bg-blue-500 h-3 rounded-full transition-all duration-500 flex items-center justify-end pr-1"
                  style="width: 0%"
                >
                  <span id="agua-progresso-emoji" class="text-xs opacity-0 transition-opacity">💧</span>
                </div>
              </div>

              <!-- Botões de Ação Rápida -->
              <div class="flex gap-2">
                <button
                  onclick="window.adicionarAgua && window.adicionarAgua(250)"
                  class="flex-1 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-semibold transition-colors"
                >
                  +250ml
                </button>
                <button
                  onclick="window.adicionarAgua && window.adicionarAgua(500)"
                  class="flex-1 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-semibold transition-colors"
                >
                  +500ml
                </button>
                <button
                  onclick="window.openWaterSettings && window.openWaterSettings()"
                  class="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-xs font-semibold transition-colors"
                  title="Configurações"
                >
                  ⚙️
                </button>
              </div>
            </div>

            <!-- Lista de Missões Diárias -->
            <div class="card-rpg">
              <h3 class="text-base font-bold mb-2">Missões Diárias</h3>
              <div id="rotinaContainer" class="space-y-2">
                <!-- Missões diárias serão inseridas aqui via script.js -->
              </div>
              <div id="rotinaEmpty" class="text-center py-4 text-gray-400 text-sm hidden">
                <div class="text-2xl mb-1">📭</div>
                <p>Nenhuma missão diária cadastrada</p>
              </div>
            </div>
          </div>

          <!-- Conteúdo: Jornada -->
          <div id="conteudo-jornada" class="hidden space-y-3 mt-0">
            <div class="card-rpg">
              <h3 class="text-base font-bold mb-2">Jornada</h3>
              <div id="jornadaContainer" class="space-y-2">
                <!-- Missões da jornada serão inseridas aqui -->
              </div>
              <div id="jornadaEmpty" class="text-center py-4 text-gray-400 text-sm hidden">
                <div class="text-2xl mb-1">🧭</div>
                <p>Nenhuma missão na jornada</p>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Navegação inferior dinâmica - será preenchida via JavaScript (renderizarNavegacao) -->
      <nav id="bottom-nav" class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around"></nav>
    </div>
  </div>
</body>
</html>
